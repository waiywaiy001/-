<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>個人創作與生活管理系統 v3</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f8f9fa; --text: #2d3436; --accent: #ff9f43; --success: #2ecc71; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        h1 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        
        /* 導覽列 */
        .nav-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .nav-btn { padding: 8px 18px; border: none; background: #eee; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.3s; }
        .nav-btn.active { background: var(--primary); color: white; }
        .nav-btn.all-view { background: var(--accent); color: white; }

        /* 表格與拖曳樣式 */
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { background: #f1f2f6; padding: 12px; text-align: left; border-bottom: 2px solid var(--primary); }
        td { padding: 12px; border-bottom: 1px solid #eee; background: white; vertical-align: middle; }
        
        .draggable-row { cursor: grab; transition: background 0.2s; }
        .draggable-row:active { cursor: grabbing; background: #eef2f7; }
        .draggable-row.dragging { opacity: 0.5; background: #d1d8e0; }

        .editable { padding: 5px; border-radius: 4px; outline: none; display: block; }
        .editable:focus { background: #fffde7; border: 1px solid var(--accent); }

        /* 已完成樣式 */
        .completed .editable { text-decoration: line-through; color: #b2bec3; }
        .check-col { text-align: center; width: 60px; }
        input[type="checkbox"] { transform: scale(1.5); cursor: pointer; }

        /* 總覽頁面樣式 */
        .all-days-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .day-card { border: 1px solid #ddd; border-radius: 12px; padding: 15px; background: #fff; }
        .day-card h3 { margin-top: 0; color: var(--primary); border-bottom: 1px solid #eee; }
        .summary-item { margin: 5px 0; font-size: 0.9em; }
        .summary-done { text-decoration: line-through; color: #b2bec3; }

        /* 筆記區 */
        .notes-section { margin-top: 30px; padding-top: 20px; border-top: 2px dashed #ccc; }
        #globalNotes { width: 100%; min-height: 150px; padding: 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 1em; resize: vertical; box-sizing: border-box; }

        .btn-group { display: flex; justify-content: space-between; align-items: center; }
        .add-btn { background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="viewTitle">載入中...</h1>
    
    <div class="nav-bar" id="navBar"></div>

    <div id="tableView">
        <table id="scheduleTable">
            <thead>
                <tr>
                    <th style="width: 40px;">↕</th>
                    <th style="width: 60px;">完成</th>
                    <th style="width: 100px;">時間</th>
                    <th>行程項目</th>
                    <th>備註</th>
                    <th style="width: 50px;">操作</th>
                </tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
        </table>
        <div class="btn-group">
            <span style="font-size: 0.85em; color: #95a5a6;">💡 拖曳 ↕ 排序，點擊文字編輯，勾選完成任務</span>
            <button class="add-btn" onclick="addNewRow()">+ 新增行程</button>
        </div>
    </div>

    <div id="allView" style="display:none;" class="all-days-grid"></div>

    <div class="notes-section">
        <h2>📝 全局筆記 / 備忘錄</h2>
        <textarea id="globalNotes" placeholder="紀錄本週的靈感或重要事項..." oninput="saveNotes()"></textarea>
    </div>
</div>

<script>
    const days = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];
    let currentView = new Date().getDay();
    
    const defaultData = {
        1: [{ t: "21:30", task: "日語課", note: "", done: false }],
        2: [{ t: "09:30", task: "起床", note: "", done: false }, { t: "11:00", task: "健身", note: "", done: false }],
        4: [{ t: "21:00", task: "日語課", note: "", done: false }],
        5: [{ t: "09:30", task: "起床", note: "", done: false }, { t: "11:00", task: "健身", note: "", done: false }]
    };

    let data = JSON.parse(localStorage.getItem('v3_weekly_data')) || defaultData;
    let notes = localStorage.getItem('v3_weekly_notes') || "";

    function init() {
        const nav = document.getElementById('navBar');
        days.forEach((day, i) => {
            const btn = document.createElement('button');
            btn.className = `nav-btn ${i === currentView ? 'active' : ''}`;
            btn.innerText = day;
            btn.onclick = () => switchView(i);
            nav.appendChild(btn);
        });

        const allBtn = document.createElement('button');
        allBtn.className = "nav-btn all-view";
        allBtn.innerText = "📅 全週總覽";
        allBtn.onclick = () => switchView('all');
        nav.appendChild(allBtn);

        document.getElementById('globalNotes').value = notes;
        render();
    }

    function switchView(view) {
        currentView = view;
        document.querySelectorAll('.nav-btn').forEach((btn, i) => {
            btn.classList.remove('active');
            if(i === view) btn.classList.add('active');
        });
        render();
    }

    function render() {
        const tableArea = document.getElementById('tableView');
        const allArea = document.getElementById('allView');
        const title = document.getElementById('viewTitle');

        if (currentView === 'all') {
            title.innerText = "全週行程總覽";
            tableArea.style.display = 'none';
            allArea.style.display = 'grid';
            renderAllView();
        } else {
            title.innerText = `${days[currentView]} 行程表`;
            tableArea.style.display = 'block';
            allArea.style.display = 'none';
            renderTableView();
        }
    }

    function renderTableView() {
        const tbody = document.getElementById('scheduleBody');
        tbody.innerHTML = '';
        const dayData = data[currentView] || [];

        dayData.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.className = `draggable-row ${item.done ? 'completed' : ''}`;
            tr.draggable = true;
            tr.dataset.index = index;
            
            tr.addEventListener('dragstart', handleDragStart);
            tr.addEventListener('dragover', handleDragOver);
            tr.addEventListener('drop', handleDrop);
            tr.addEventListener('dragend', handleDragEnd);

            tr.innerHTML = `
                <td style="color:#ccc; text-align:center;">☰</td>
                <td class="check-col"><input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleDone(${index}, this.checked)"></td>
                <td><span class="editable" contenteditable="true" onblur="update(${index}, 't', this.innerText)">${item.t}</span></td>
                <td><span class="editable" contenteditable="true" onblur="update(${index}, 'task', this.innerText)">${item.task}</span></td>
                <td><span class="editable" contenteditable="true" onblur="update(${index}, 'note', this.innerText)">${item.note}</span></td>
                <td><button onclick="removeRow(${index})" style="color:#e74c3c; border:none; background:none; cursor:pointer;">✕</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function renderAllView() {
        const allArea = document.getElementById('allView');
        allArea.innerHTML = '';
        days.forEach((day, i) => {
            const dayTasks = data[i] || [];
            let html = `<div class="day-card"><h3>${day}</h3>`;
            if (dayTasks.length === 0) html += `<p style="color:#999;">無行程</p>`;
            dayTasks.forEach(task => {
                const doneClass = task.done ? 'summary-done' : '';
                html += `<p class="summary-item ${doneClass}"><strong>${task.t}</strong> ${task.task}</p>`;
            });
            html += `</div>`;
            allArea.innerHTML += html;
        });
    }

    function toggleDone(index, isDone) {
        data[currentView][index].done = isDone;
        save();
        renderTableView();
    }

    function update(index, field, value) {
        data[currentView][index][field] = value;
        save();
    }

    function addNewRow() {
        if (!data[currentView]) data[currentView] = [];
        data[currentView].push({ t: "09:00", task: "新任務", note: "", done: false });
        renderTableView();
        save();
    }

    function removeRow(index) {
        if(confirm("確定刪除？")) {
            data[currentView].splice(index, 1);
            renderTableView();
            save();
        }
    }

    function saveNotes() {
        localStorage.setItem('v3_weekly_notes', document.getElementById('globalNotes').value);
    }

    function save() {
        localStorage.setItem('v3_weekly_data', JSON.stringify(data));
    }

    let dragSourceIndex = null;
    function handleDragStart(e) { dragSourceIndex = this.dataset.index; this.classList.add('dragging'); }
    function handleDragOver(e) { e.preventDefault(); }
    function handleDrop(e) {
        e.preventDefault();
        const targetIndex = this.dataset.index;
        if (dragSourceIndex !== targetIndex) {
            const temp = data[currentView].splice(dragSourceIndex, 1)[0];
            data[currentView].splice(targetIndex, 0, temp);
            save();
            renderTableView();
        }
    }
    function handleDragEnd() { this.classList.remove('dragging'); }

    init();
</script>

</body>
</html>
